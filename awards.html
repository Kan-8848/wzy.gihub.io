<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>奖项荣誉</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
        }

        body {
            background: #fff;
            padding: 40px 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 26px;
            color: #333;
            margin-bottom: 10px;
        }

        .back {
            display: inline-block;
            padding: 8px 20px;
            background: #f1f3f5;
            border-radius: 50px;
            text-decoration: none;
            color: #333;
            font-size: 14px;
        }

        /* 横向滑动容器 */
        .slide-container {
            display: flex;
            gap: 16px;
            overflow-x: auto;
            padding: 10px 5px 20px;
            scroll-snap-type: x mandatory;
        }

        /* 奖项卡片 */
        .award-card {
            width: 220px;
            flex-shrink: 0;
            scroll-snap-align: start;
            background: #f9f9f9;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .award-card:hover {
            transform: translateY(-4px);
        }

        /* 卡片图片 */
        .award-img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }

        /* 卡片文字 */
        .award-info {
            padding: 14px;
        }

        .award-title {
            font-size: 15px;
            font-weight: 500;
            color: #222;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .award-time {
            font-size: 12px;
            color: #888;
        }

        /* 普通弹窗（单张图） */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal img {
            max-width: 95%;
            max-height: 90vh;
            border-radius: 12px;
        }

        /* 奖项4专用弹窗（三张图滑动） */
        .modal-slide {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 999;
            padding: 20px;
        }

        .slide-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .slide-content {
            width: 90%;
            max-width: 800px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            display: flex;
            gap: 15px;
            padding-bottom: 20px;
        }

        .slide-item {
            flex-shrink: 0;
            width: 100%;
            scroll-snap-align: center;
        }

        .slide-item img {
            width: 100%;
            height: auto;
            max-height: 80vh;
            border-radius: 12px;
            object-fit: contain;
        }

        /* 关闭按钮 */
        .close {
            position: absolute;
            top: 30px;
            right: 30px;
            color: #fff;
            font-size: 36px;
            cursor: pointer;
            z-index: 1000;
        }
    </style>
</head>
