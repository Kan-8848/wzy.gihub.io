    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
            scroll-behavior: smooth;
        }
        :root {
            --bg: #fff;
            --card: #f7f7f7;
            --text: #2a2a2a;
            --sub: #666;
            --accent: #4a6cf7;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #121212;
                --card: #1e1e1e;
                --text: #e0e0e0;
                --sub: #aaa;
            }
        }
        body {
            background: var(--bg);
            color: var(--text);
            padding-bottom: 60px;
        }
        .header {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 28px;
            color: var(--accent);
        }
        .back-btn {
            padding: 10px 22px;
            background: var(--accent);
            color: #fff;
            border-radius: 50px;
            text-decoration: none;
            font-size: 15px;
            transition: 0.3s;
        }
        .back-btn:hover {
            background: #3a5ce0;
        }
        .photo-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .photo-item {
            border-radius: 14px;
            overflow: hidden;
            cursor: pointer;
            transition: 0.3s;
        }
        .photo-item img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            display: block;
        }
        .photo-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 999;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal img {
            max-width: 92%;
            max-height: 92vh;
            border-radius: 10px;
        }
        .close {
            position: fixed;
            top: 25px; right: 30px;
            color: white;
            font-size: 36px;
            cursor: pointer;
            z-index: 9999;
        }
        @media (max-width:768px) {
            .header {
                flex-direction: column;
                gap:20px;
                text-align: center;
            }
            .photo-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<div class="modal" id="imgModal">
    <span class="close">&times;</span>
    <img src="" id="modalImg">
</div>

<script>
    const modal = document.getElementById("imgModal");
    const modalImg = document.getElementById("modalImg");
    const closeBtn = document.querySelector(".close");
    const imgs = document.querySelectorAll(".preview-img");

    imgs.forEach(img=>{
        img.addEventListener("click",()=>{
            modal.style.display="flex";
            modalImg.src=img.src;
        });
    });
    closeBtn.onclick=()=>{modal.style.display="none";}
    window.onclick=(e)=>{if(e.target===modal) modal.style.display="none";}
</script>
